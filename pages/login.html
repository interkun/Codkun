<div class="flex items-center justify-center w-full h-full bg-gray-50 px-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg border border-gray-200 p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
                <i class="fas fa-code text-blue-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800" id="auth-title">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-2">Sign in to access your cloud workspace</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required 
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm" 
                        placeholder="name@example.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" required 
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="auth-submit-btn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow-md flex items-center justify-center gap-2">
                <span>Sign In</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">
                <span id="auth-switch-text">Don't have an account?</span>
                <button id="auth-switch-btn" class="text-blue-600 font-bold hover:underline ml-1">Create Account</button>
            </p>
        </div>
        
        <div id="auth-error" class="mt-4 text-xs text-red-500 text-center hidden font-medium bg-red-50 p-2 rounded">
            Invalid email or password.
        </div>
    </div>
</div>
